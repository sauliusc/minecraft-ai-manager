# One-click deployment — uses pre-built images from GitHub Container Registry.
# Start everything: docker compose up -d
# View logs:        docker compose logs -f
# Stop:             docker compose down

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: ghcr.io/sauliusc/minecraft-ai-manager/api:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      NODE_ENV:               production
      PORT:                   3000
      DATABASE_URL:           postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL:              redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:             ${JWT_SECRET}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BRIDGE_SECRET:          ${BRIDGE_SECRET}
      MINECRAFT_BRIDGE_URL:   http://minecraft:25580
      MINECRAFT_HOST:         minecraft
      RCON_PORT:              ${RCON_PORT:-25575}
      RCON_PASSWORD:          ${RCON_PASSWORD}
      ADMIN_EMAIL:            ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD:         ${ADMIN_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  web:
    image: ghcr.io/sauliusc/minecraft-ai-manager/web:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"

  # ── MCP server (Claude tool access) ─────────────────────────────────────────
  mcp:
    image: ghcr.io/sauliusc/minecraft-ai-manager/mcp:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${MCP_PORT:-3100}:3100"
    environment:
      PORT:                  3100
      CRAFTCONTROL_URL:      http://api:3000
      CRAFTCONTROL_EMAIL:    ${ADMIN_EMAIL}
      CRAFTCONTROL_PASSWORD: ${ADMIN_PASSWORD}
      MCP_AUTH_TOKEN:        ${MCP_AUTH_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Minecraft server ────────────────────────────────────────────────────────
  minecraft:
    image: ghcr.io/sauliusc/minecraft-ai-manager/minecraft:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "25565:25565"
    volumes:
      - minecraft_data:/data
    environment:
      EULA:          "TRUE"
      TYPE:          PAPER
      VERSION:       "26.1.2"
      MEMORY:        ${MINECRAFT_MEMORY:-4G}
      ENABLE_RCON:   "true"
      RCON_PORT:     ${RCON_PORT:-25575}
      RCON_PASSWORD: ${RCON_PASSWORD}
      BRIDGE_SECRET: ${BRIDGE_SECRET}
      CFG_BRIDGE_SECRET: ${BRIDGE_SECRET}
      # ONLINE_MODE: "false"   # uncomment to allow non-premium accounts
    healthcheck:
      test: ["CMD-SHELL", "mc-monitor status --host localhost --port 25565 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  postgres_data:
  redis_data:
  minecraft_data:
