# One-click deployment — uses pre-built images from GitHub Container Registry.
# Start everything: docker compose up -d
# View logs:        docker compose logs -f
# Stop:             docker compose down
#
# First-time only: copy BRIDGE_SECRET to your Minecraft server
#   grep BRIDGE_SECRET .env
#   DiscoPanel → Startup → Environment Variables → BRIDGE_SECRET=<value>

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: ghcr.io/sauliusc/minecraft-ai-manager/api:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:               production
      PORT:                   3000
      DATABASE_URL:           postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL:              redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:             ${JWT_SECRET}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BRIDGE_SECRET:          ${BRIDGE_SECRET}
      MINECRAFT_BRIDGE_URL:   http://${GAME_VM_HOST:-127.0.0.1}:25580
      ADMIN_EMAIL:            ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD:         ${ADMIN_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  web:
    image: ghcr.io/sauliusc/minecraft-ai-manager/web:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  postgres_data:
  redis_data:
