# Paper per-world defaults — performance tuning
# Bind-mounted into /data/config/paper-world-defaults.yml by docker-compose.
# Only override keys that differ from Paper's built-in defaults; Paper merges
# the rest. See https://docs.papermc.io/paper/reference/world-configuration
_version: 30

tick-rates:
  behavior:
    villager:
      # Paper default: -1 (run every tick). With a trading hall or large
      # village the O(n²) entity-push loop causes the server thread to stall
      # for 15-20 s. Raising these to 60/120 ticks (3s / 6s) cuts per-tick
      # villager CPU by ~97% with no noticeable gameplay impact.
      validatenearbypoi: 60
      acquirepoi: 120

entities:
  collision:
    # Disable entity pushing entirely (0 = off). Paper checks this BEFORE
    # calling getPushableEntities(), so the O(n) entity scan is bypassed
    # completely. The world has excess villagers that cause a 30s+ freeze
    # on every tick; re-enable once villager population is reduced via RCON.
    max-entity-collisions: 0
  spawning:
    entity-per-chunk-save-limit:
      # Prevent runaway villager accumulation in trading halls / breeders.
      # Paper default is -1 (unlimited). 20 per chunk is generous for normal play.
      villager: 20
      # Keep projectile spam from bloating saves.
      arrow: 16
      snowball: 8
      egg: 8
      ender_pearl: 8
      fireball: 8
      small_fireball: 8
      experience_orb: 16
