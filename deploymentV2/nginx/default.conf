server {
    listen       80;
    server_name  _;

    # Use Docker's embedded DNS so upstream hostnames resolve at request time
    # rather than at nginx startup (prevents "host not found in upstream" on boot).
    resolver 127.0.0.11 valid=30s;

    # React SPA root
    root  /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy ────────────────────────────────────────────────────
    location /api/ {
        set $api_backend api:3000;
        proxy_pass         http://$api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Upload size for chat-log batch inserts
        client_max_body_size 2m;
    }

    # ── React client-side routing (must come after /api/) ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "same-origin" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
