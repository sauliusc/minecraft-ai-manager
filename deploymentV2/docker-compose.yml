services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Node.js API ───────────────────────────────────────────────────────────
  api:
    image: ghcr.io/sauliusc/minecraft-ai-manager/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      NODE_ENV:                 production
      PORT:                     3000
      DATABASE_URL:             postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL:                redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:               ${JWT_SECRET}
      JWT_REFRESH_SECRET:       ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN:           ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN:   ${JWT_REFRESH_EXPIRES_IN:-7d}
      BRIDGE_SECRET:            ${BRIDGE_SECRET}
      MINECRAFT_BRIDGE_URL:     http://minecraft:25580
      RCON_HOST:                minecraft
      RCON_PORT:                ${RCON_PORT:-25575}
      RCON_PASSWORD:            ${RCON_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── MCP server (Claude tool access) ──────────────────────────────────────
  mcp:
    image: ghcr.io/sauliusc/minecraft-ai-manager/mcp:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${MCP_PORT:-3100}:3100"
    environment:
      PORT:                  3100
      CRAFTCONTROL_URL:      http://api:3000
      CRAFTCONTROL_EMAIL:    ${ADMIN_EMAIL}
      CRAFTCONTROL_PASSWORD: ${ADMIN_PASSWORD}
      MCP_AUTH_TOKEN:        ${MCP_AUTH_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3100/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── React SPA + Nginx reverse proxy ──────────────────────────────────────
  web:
    image: ghcr.io/sauliusc/minecraft-ai-manager/web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  # ── Minecraft server ──────────────────────────────────────────────────────
  minecraft:
    image: ghcr.io/sauliusc/minecraft-ai-manager/minecraft:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      EULA:                  "TRUE"
      TYPE:                  PAPER
      VERSION:               ${MINECRAFT_VERSION:-1.21.1}
      MEMORY:                ${MINECRAFT_MEMORY:-4G}
      ENABLE_RCON:           "true"
      RCON_PORT:             ${RCON_PORT:-25575}
      RCON_PASSWORD:         ${RCON_PASSWORD}
      REPLACE_ENV_VARIABLES: "TRUE"
      CFG_BRIDGE_SECRET:     ${BRIDGE_SECRET}
      CFG_BRIDGE_API_URL:    http://api:3000
    volumes:
      - minecraft_data:/data
    ports:
      - "25565:25565"   # Minecraft players

volumes:
  postgres_data:
  redis_data:
  minecraft_data:
