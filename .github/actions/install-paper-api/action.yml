name: Install Paper API for Maven
description: >
  Restores the Paper API JAR from the GHA cache (seeded by the ct102 self-hosted
  runner via seed-paper-api.yml). Falls back to downloading directly from
  fill.papermc.io when the cache is cold (accessible on ct102, blocked on
  standard GitHub-hosted runners).
  Builds an uber-JAR (paper-api + Adventure), installs it into the local Maven
  repository, and writes settings.xml ONLY after a confirmed installation so
  that a failed download never leaves Maven pointing at an empty local mirror.

runs:
  using: composite
  steps:
    # ── 1. Restore from GHA cache (optional — may not be accessible on self-hosted runners) ──
    - name: Restore Paper API from GHA cache
      id: paper-cache
      continue-on-error: true   # cache service may be unavailable on self-hosted runners
      uses: actions/cache/restore@v4
      with:
        path: ~/.m2/repository/io/papermc/paper/paper-api
        key: paper-api-26.1.2-R0.1-SNAPSHOT-${{ runner.os }}
        restore-keys: |
          paper-api-26.1.2-R0.1-SNAPSHOT-

    # ── 2. Install Paper API (skip if cache hit) ──────────────────────────────
    - name: Pre-install Paper API (bypass repo.papermc.io CI restrictions)
      shell: bash
      run: |
        set -euo pipefail

        PAPER_VERSION="26.1.2-R0.1-SNAPSHOT"
        MC_VERSION="26.1.2"
        PAPER_INSTALLED="$HOME/.m2/repository/io/papermc/paper/paper-api/${PAPER_VERSION}/paper-api-${PAPER_VERSION}.jar"

        echo "::notice::diag HOME=${HOME} JAVA_HOME=${JAVA_HOME:-UNSET} PATH=${PATH}"
        echo "::notice::diag paper-api exists=$([ -f "$PAPER_INSTALLED" ] && echo YES || echo NO)"
        java -version 2>&1 | head -1 || echo "java not found"

        # ── Helper: write settings.xml so Maven uses the local file mirror ──
        write_settings() {
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS'
        <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
          <mirrors>
            <mirror>
              <id>papermc-local</id>
              <mirrorOf>papermc</mirrorOf>
              <url>file://${user.home}/.m2/repository</url>
            </mirror>
            <mirror>
              <id>spigotmc-local</id>
              <mirrorOf>spigotmc-snapshots</mirrorOf>
              <url>file://${user.home}/.m2/repository</url>
            </mirror>
          </mirrors>
        </settings>
        SETTINGS
        }

        # ── Cache hit: JAR already in local repo ──────────────────────────────
        if [ -f "$PAPER_INSTALLED" ]; then
          echo "::notice::Paper API already installed ($(du -sh "$PAPER_INSTALLED" | cut -f1)), writing settings.xml and skipping download"
          write_settings
          exit 0
        fi

        # ── Fetch build info (Fill v3 API — v2 stopped receiving builds Dec 31 2025) ──
        PAPERMC_UA="craftcontrol-preinstall/1.0 (https://github.com/sauliusc/minecraft-ai-manager)"
        echo "::notice::cp=before-curl mc=${MC_VERSION}"
        BUILD_INFO=$(curl -sf --max-time 20 \
          -H "User-Agent: ${PAPERMC_UA}" \
          "https://fill.papermc.io/v3/projects/paper/versions/${MC_VERSION}/builds") || {
          echo "::error::Fill v3 API returned an error for version '${MC_VERSION}'."
          echo "::error::Check https://fill.papermc.io/v3/projects/paper/versions for valid versions."
          echo "::error::On standard GHA runners fill.papermc.io may be blocked — run seed-paper-api.yml manually to populate the GHA cache."
          exit 1
        }
        echo "::notice::cp=after-curl len=${#BUILD_INFO} head=$(echo "$BUILD_INFO" | head -c 120 | tr -d '\n')"

        # ── Parse Fill v3 JSON with POSIX tools (no jq/python3 on ct102) ────────
        # set -e is active; use '|| true' so grep exits (1=no match) never kills the
        # parent shell via the command-substitution exit-code propagation.
        # Builds are returned newest-first; use head -1 to get the most recent build.
        set +o pipefail
        URL=$(echo "$BUILD_INFO" \
          | grep -A 5 '"server:default"' \
          | grep '"url"' \
          | head -1 \
          | sed -E 's/.*"url"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/' \
          || true)
        BUILD=$(echo "$BUILD_INFO" \
          | grep -oE '"id"[[:space:]]*:[[:space:]]*[0-9]+' \
          | head -1 \
          | grep -oE '[0-9]+$' \
          || true)
        CHANNEL=$(echo "$BUILD_INFO" \
          | grep -oE '"channel"[[:space:]]*:[[:space:]]*"[^"]+"' \
          | head -1 \
          | sed -E 's/.*"([^"]+)"$/\1/' \
          || true)
        set -o pipefail
        echo "::notice::parsed build=${BUILD} channel=${CHANNEL} url=${URL}"
        if [ -z "$URL" ]; then
          echo "::error::No build URL found for Paper ${MC_VERSION} in Fill v3 API (build=${BUILD} channel=${CHANNEL})"
          exit 1
        fi

        # ── Download Paperclip bundler ────────────────────────────────────────
        curl -fsSL --max-time 300 -H "User-Agent: ${PAPERMC_UA}" -o paperclip.jar "$URL"
        echo "::notice::downloaded size=$(du -sh paperclip.jar | cut -f1)"

        # ── Extract paper-api + Adventure JARs from bundler ──────────────────
        WORKSPACE=$(pwd)
        mkdir -p /tmp/paper-extract
        cd /tmp/paper-extract
        ENTRIES=$(jar tf "$WORKSPACE/paperclip.jar" 2>/dev/null \
          | grep -E "META-INF/libraries/.*\.jar$" \
          | grep -Ev "sources|javadoc" || true)
        while IFS= read -r entry; do
          [ -n "$entry" ] || continue
          jar xf "$WORKSPACE/paperclip.jar" "$entry" 2>/dev/null || true
        done <<< "$ENTRIES"
        cd -

        # ── Find paper-api JAR ────────────────────────────────────────────────
        PAPER_API_JAR=$(find /tmp/paper-extract -name "paper-api-*.jar" \
          ! -name "*-sources.jar" ! -name "*-javadoc.jar" 2>/dev/null | head -1 || true)
        echo "::notice::paper-api jar=${PAPER_API_JAR:-NONE}"
        if [ -z "$PAPER_API_JAR" ]; then
          echo "::error::paper-api JAR not found inside Paperclip bundler for version ${MC_VERSION}"
          exit 1
        fi

        # ── Build uber-JAR (paper-api + Adventure + Gson classes) ───────────────
        mkdir -p /tmp/uber-api
        cd /tmp/uber-api
        jar xf "$PAPER_API_JAR"
        while IFS= read -r ajar; do
          jar xf "$ajar" 2>/dev/null || true
        done < <(find /tmp/paper-extract \
          \( -path "*/net/kyori/*.jar" -o -name "gson-*.jar" \) \
          ! -name "*-sources.jar" ! -name "*-javadoc.jar" 2>/dev/null)
        cd -
        jar cf /tmp/paper-api-uber.jar -C /tmp/uber-api .
        rm paperclip.jar
        echo "::notice::uber-jar size=$(du -sh /tmp/paper-api-uber.jar)"

        # ── Install into local Maven repo (direct file placement — no mvn needed) ──
        # mvn is not reliably on PATH inside composite action steps on ct102.
        # Direct placement into ~/.m2/repository is equivalent to mvn install:install-file.
        API_DIR="${HOME}/.m2/repository/io/papermc/paper/paper-api/${PAPER_VERSION}"
        mkdir -p "${API_DIR}"
        cp /tmp/paper-api-uber.jar "${API_DIR}/paper-api-${PAPER_VERSION}.jar"
        printf '<?xml version="1.0" encoding="UTF-8"?>\n<project>\n  <modelVersion>4.0.0</modelVersion>\n  <groupId>io.papermc.paper</groupId>\n  <artifactId>paper-api</artifactId>\n  <version>%s</version>\n</project>\n' \
          "${PAPER_VERSION}" > "${API_DIR}/paper-api-${PAPER_VERSION}.pom"

        echo "::notice::installed=$(du -sh "$PAPER_INSTALLED" 2>/dev/null || echo MISSING)"

        # ── Write settings.xml NOW — JAR is confirmed present ─────────────────
        # IMPORTANT: settings.xml is written here, AFTER successful installation.
        # If it were written earlier and the download failed, Maven would point at
        # an empty local mirror and cache a negative resolution result.
        write_settings
        echo "::notice::settings.xml written — Maven will use local mirror for papermc/spigotmc repos"

    - name: Pre-install BungeeCord Chat stubs (not in Paper bundler)
      shell: bash
      run: |
        set -euo pipefail
        echo "::notice::diag-bungee HOME=${HOME} JAVA_HOME=${JAVA_HOME:-UNSET}"
        echo "::notice::diag-bungee javac=$(which javac 2>/dev/null || echo MISSING) jar=$(which jar 2>/dev/null || echo MISSING)"
        javac -version 2>&1 | head -1 || echo "javac not found"
        # bungeecord-chat is Paper's private build at repo.papermc.io (blocked on GHA runners)
        # and is absent from the Paperclip bundler. We create minimal compile-only stubs.
        rm -rf ~/.m2/repository/net/md_5/bungee/bungeecord-chat 2>/dev/null || true

        mkdir -p /tmp/bungee-src/net/md_5/bungee/api/chat \
                 /tmp/bungee-src/net/md_5/bungee/api \
                 /tmp/bungee-src/net/md_5/bungee/chat \
                 /tmp/bungee-classes

        cat > /tmp/bungee-src/net/md_5/bungee/api/ChatColor.java << 'JAVASRC'
        package net.md_5.bungee.api;
        public enum ChatColor {
            BLACK, DARK_BLUE, DARK_GREEN, DARK_AQUA, DARK_RED, DARK_PURPLE,
            GOLD, GRAY, DARK_GRAY, BLUE, GREEN, AQUA, RED, LIGHT_PURPLE,
            YELLOW, WHITE, MAGIC, BOLD, STRIKETHROUGH, UNDERLINE, ITALIC, RESET;
            public static ChatColor of(String s) { return WHITE; }
            public static String stripColor(String in) { return in; }
            public static String translateAlternateColorCodes(char c, String s) { return s; }
            public char getChar() { return '\0'; }
            public boolean isColor() { return true; }
            public boolean isFormat() { return false; }
            public String getName() { return name().toLowerCase(); }
        }
        JAVASRC

        cat > /tmp/bungee-src/net/md_5/bungee/api/ChatMessageType.java << 'JAVASRC'
        package net.md_5.bungee.api;
        public enum ChatMessageType { CHAT, SYSTEM, ACTION_BAR }
        JAVASRC

        cat > /tmp/bungee-src/net/md_5/bungee/api/chat/BaseComponent.java << 'JAVASRC'
        package net.md_5.bungee.api.chat;
        import java.util.List;
        public abstract class BaseComponent implements java.io.Serializable, Cloneable {
            public abstract BaseComponent duplicate();
            public String toLegacyText() { return ""; }
            public String toPlainText() { return ""; }
            public List<BaseComponent> getExtra() { return null; }
            public void addExtra(BaseComponent component) {}
            public void addExtra(String text) {}
            public boolean hasFormatting() { return false; }
        }
        JAVASRC

        cat > /tmp/bungee-src/net/md_5/bungee/api/chat/TextComponent.java << 'JAVASRC'
        package net.md_5.bungee.api.chat;
        public class TextComponent extends BaseComponent {
            public TextComponent() {}
            public TextComponent(String text) {}
            public TextComponent(BaseComponent... extra) {}
            @Override public BaseComponent duplicate() { return new TextComponent(); }
        }
        JAVASRC

        cat > /tmp/bungee-src/net/md_5/bungee/api/chat/ClickEvent.java << 'JAVASRC'
        package net.md_5.bungee.api.chat;
        import java.io.Serializable;
        public final class ClickEvent implements Serializable {
            public ClickEvent(Action a, String v) {}
            public enum Action { OPEN_URL, OPEN_FILE, RUN_COMMAND, SUGGEST_COMMAND, CHANGE_PAGE, COPY_TO_CLIPBOARD }
        }
        JAVASRC

        cat > /tmp/bungee-src/net/md_5/bungee/api/chat/HoverEvent.java << 'JAVASRC'
        package net.md_5.bungee.api.chat;
        import java.io.Serializable;
        public final class HoverEvent implements Serializable {
            public HoverEvent(Action a, BaseComponent... v) {}
            public enum Action { SHOW_TEXT, SHOW_ACHIEVEMENT, SHOW_ITEM, SHOW_ENTITY }
        }
        JAVASRC

        cat > /tmp/bungee-src/net/md_5/bungee/api/chat/ComponentBuilder.java << 'JAVASRC'
        package net.md_5.bungee.api.chat;
        public final class ComponentBuilder {
            public ComponentBuilder(String text) {}
            public ComponentBuilder(BaseComponent orig) {}
            public ComponentBuilder append(String text) { return this; }
            public ComponentBuilder append(BaseComponent component) { return this; }
            public BaseComponent[] create() { return null; }
            public enum FormatRetention { NONE, ALL, FORMATTING, EVENTS }
        }
        JAVASRC

        cat > /tmp/bungee-src/net/md_5/bungee/chat/ComponentSerializer.java << 'JAVASRC'
        package net.md_5.bungee.chat;
        public class ComponentSerializer {
            public static net.md_5.bungee.api.chat.BaseComponent[] parse(String j) { return null; }
            public static String toString(net.md_5.bungee.api.chat.BaseComponent... c) { return ""; }
        }
        JAVASRC

        javac -d /tmp/bungee-classes \
          /tmp/bungee-src/net/md_5/bungee/api/ChatColor.java \
          /tmp/bungee-src/net/md_5/bungee/api/ChatMessageType.java \
          /tmp/bungee-src/net/md_5/bungee/api/chat/BaseComponent.java \
          /tmp/bungee-src/net/md_5/bungee/api/chat/ClickEvent.java \
          /tmp/bungee-src/net/md_5/bungee/api/chat/HoverEvent.java \
          /tmp/bungee-src/net/md_5/bungee/api/chat/TextComponent.java \
          /tmp/bungee-src/net/md_5/bungee/api/chat/ComponentBuilder.java \
          /tmp/bungee-src/net/md_5/bungee/chat/ComponentSerializer.java
        jar cf /tmp/bungeecord-chat-stub.jar -C /tmp/bungee-classes .
        echo "::notice::bungee-stubs size=$(du -sh /tmp/bungeecord-chat-stub.jar | cut -f1)"
        # Direct placement into ~/.m2/repository — no mvn needed (not reliably on PATH)
        BUNGEE_VER="26.1.2-R0.1-SNAPSHOT"
        BUNGEE_DIR="${HOME}/.m2/repository/net/md_5/bungee/bungeecord-chat/${BUNGEE_VER}"
        mkdir -p "${BUNGEE_DIR}"
        cp /tmp/bungeecord-chat-stub.jar "${BUNGEE_DIR}/bungeecord-chat-${BUNGEE_VER}.jar"
        printf '<?xml version="1.0" encoding="UTF-8"?>\n<project>\n  <modelVersion>4.0.0</modelVersion>\n  <groupId>net.md_5.bungee</groupId>\n  <artifactId>bungeecord-chat</artifactId>\n  <version>%s</version>\n</project>\n' \
          "${BUNGEE_VER}" > "${BUNGEE_DIR}/bungeecord-chat-${BUNGEE_VER}.pom"
        echo "::notice::bungee-installed $(du -sh "${BUNGEE_DIR}/bungeecord-chat-${BUNGEE_VER}.jar" | cut -f1)"
