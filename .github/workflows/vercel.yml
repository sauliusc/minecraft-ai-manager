name: Vercel Deployments

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/vercel.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'client/**'
      - '.github/workflows/vercel.yml'

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Check Vercel secrets are configured
        id: check
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel secrets not configured — skipping deployment. See DEPLOY.md §8 to set up VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: steps.check.outputs.configured == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        if: steps.check.outputs.configured == 'true'
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        if: steps.check.outputs.configured == 'true'
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://panel.example.com/api' }}

      - name: Deploy to Vercel
        if: steps.check.outputs.configured == 'true'
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: steps.check.outputs.configured == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = `### Vercel Preview Deployed\n\n| Environment | URL |\n|---|---|\n| Preview | ${url} |\n\nThis preview will update on every new commit to this PR.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('Vercel Preview Deployed'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
