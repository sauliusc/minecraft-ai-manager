name: Minecraft Plugin CI

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/minecraft-plugin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/minecraft-plugin.yml'
  workflow_dispatch:    # allow manual builds from the GitHub Actions UI

jobs:
  build:
    name: Build plugins (Java 25)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install Paper API + BungeeCord stubs
        # Cache is seeded by seed-paper-api.yml via the ct102 self-hosted runner.
        # If the cache is cold (first run before seeding), fill.papermc.io is
        # blocked on ubuntu-latest and this step will fail — trigger
        # seed-paper-api.yml manually (workflow_dispatch) to bootstrap the cache.
        continue-on-error: true
        uses: ./.github/actions/install-paper-api

      - name: Clear Maven negative-cache entries before build
        run: find ~/.m2 -name "*.lastUpdated" -delete 2>/dev/null || true

      - name: Build all plugins
        run: mvn -f plugins/pom.xml clean package -DskipTests --batch-mode --no-transfer-progress -q

      - name: Collect plugin JARs
        run: |
          mkdir -p /tmp/plugin-jars
          find plugins -path '*/target/*-*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-javadoc.jar' \
            | xargs -I{} cp {} /tmp/plugin-jars/ 2>/dev/null || true
          echo "=== JARs collected ==="
          ls /tmp/plugin-jars/ 2>/dev/null || echo "(none)"

      - name: Upload plugin JARs
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jars-${{ github.sha }}
          path: /tmp/plugin-jars/
          if-no-files-found: warn
          retention-days: 90
