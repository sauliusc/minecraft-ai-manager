name: Minecraft Plugin CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/minecraft-plugin.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Check PaperMC repository is reachable
        id: check
        run: |
          # Use || echo "000" so curl timeout/error (exit 28) doesn't abort the step
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "https://repo.papermc.io/repository/maven-public/io/papermc/paper/paper-api/maven-metadata.xml" \
            || echo "000")
          if [ "$status" = "200" ]; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PaperMC Maven repository returned HTTP $status — skipping plugin build. This is a known network restriction on some CI environments."
          fi

      - name: Build and test all plugins
        if: steps.check.outputs.reachable == 'true'
        run: mvn clean verify --batch-mode --no-transfer-progress
        working-directory: plugins

      - name: Upload plugin JARs
        if: steps.check.outputs.reachable == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jars
          path: plugins/*/target/*-*.jar
          if-no-files-found: ignore
