name: Minecraft Plugin CI

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/minecraft-plugin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/minecraft-plugin.yml'
  workflow_dispatch:    # allow manual builds from the GitHub Actions UI

jobs:
  build:
    name: Build plugins (Java 21)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # repo.papermc.io returns 403 from some CI environments.
      # Attempt to download the Paper server jar from the Downloads API instead
      # (different host) and install it as paper-api. The server jar is a
      # superset of the API — all compile-time symbols are present.
      # If BOTH hosts are unreachable, we skip compilation gracefully and
      # set PAPER_API_AVAILABLE=false so the build/upload steps are skipped.
      - name: Resolve Paper API (with fallback for restricted CI)
        id: paper-api
        run: |
          PAPER_VERSION="1.21.4"
          PAPER_MAVEN_VERSION="${PAPER_VERSION}-R0.1-SNAPSHOT"
          LOCAL_DIR="${HOME}/.m2/repository/io/papermc/paper/paper-api/${PAPER_MAVEN_VERSION}"

          # Fast path: already in Maven cache
          if find "${LOCAL_DIR}" -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" \
              2>/dev/null | grep -q .; then
            echo "Paper API already in local Maven cache — skipping download"
            echo "available=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "--- Attempting api.papermc.io Downloads API ---"
          BUILD=$(curl -sf --max-time 15 \
            "https://api.papermc.io/v2/projects/paper/versions/${PAPER_VERSION}/builds" \
            | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d['builds'][-1]['build'])" \
            2>/dev/null) || BUILD=""

          if [ -n "${BUILD}" ]; then
            JAR_NAME="paper-${PAPER_VERSION}-${BUILD}.jar"
            echo "Downloading ${JAR_NAME} (build ${BUILD})..."
            if curl -sf --max-time 120 -L -o /tmp/paper.jar \
                "https://api.papermc.io/v2/projects/paper/versions/${PAPER_VERSION}/builds/${BUILD}/downloads/${JAR_NAME}"; then
              echo "Downloaded $(du -sh /tmp/paper.jar | cut -f1)"
              mvn install:install-file -q \
                -Dfile=/tmp/paper.jar \
                -DgroupId=io.papermc.paper \
                -DartifactId=paper-api \
                -Dversion="${PAPER_MAVEN_VERSION}" \
                -Dpackaging=jar
              echo "Installed paper-api ${PAPER_MAVEN_VERSION} from server jar"
              echo "available=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          echo "::warning::PaperMC servers are not reachable from this CI runner."
          echo "::warning::Plugin compilation is skipped. Build plugins locally:"
          echo "::warning::  mvn -f plugins/pom.xml clean package -DskipTests"
          echo "available=false" >> "${GITHUB_OUTPUT}"

      - name: Build all plugins
        if: steps.paper-api.outputs.available == 'true'
        # -nsu: skip remote SNAPSHOT update checks — use the locally installed paper-api
        run: mvn -f plugins/pom.xml clean package -DskipTests -nsu --batch-mode --no-transfer-progress

      - name: Collect plugin JARs
        if: steps.paper-api.outputs.available == 'true'
        run: |
          mkdir -p /tmp/plugin-jars
          find plugins -path '*/target/*-*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-javadoc.jar' \
            | xargs -I{} cp {} /tmp/plugin-jars/
          echo "=== Built JARs ==="
          ls -lh /tmp/plugin-jars/

      - name: Upload plugin JARs
        if: steps.paper-api.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jars-${{ github.sha }}
          path: /tmp/plugin-jars/
          if-no-files-found: error
          retention-days: 90

      - name: Summary
        if: steps.paper-api.outputs.available != 'true'
        run: |
          echo "## Plugin Build Skipped" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "PaperMC servers (api.papermc.io) are not reachable from this CI runner." >> "${GITHUB_STEP_SUMMARY}"
          echo "Plugin JARs must be built locally:" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
          echo "mvn -f plugins/pom.xml clean package -DskipTests" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
