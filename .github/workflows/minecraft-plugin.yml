name: Minecraft Plugin CI

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/minecraft-plugin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/minecraft-plugin.yml'
  workflow_dispatch:    # allow manual builds from the GitHub Actions UI

jobs:
  # ── Seed Paper API into GHA cache from ct102 (unrestricted network) ──────────
  # fill.papermc.io is blocked on standard GitHub-hosted runners.
  # ct102 downloads Paper API and saves it to the GHA cache so that the
  # ubuntu-latest build job can restore it without touching fill.papermc.io.
  seed-cache:
    name: Seed Paper API cache (ct102)
    runs-on: [self-hosted, ct102]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Clear Maven negative-cache entries
        run: find ~/.m2 -name "*.lastUpdated" -delete 2>/dev/null || true

      - name: Install Paper API + BungeeCord stubs
        uses: ./.github/actions/install-paper-api

      - name: Save Paper API JAR to GHA cache
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/io/papermc/paper/paper-api
          key: paper-api-26.1.2-R0.1-SNAPSHOT-Linux

  # ── Build plugin JARs on ubuntu-latest (restores cache from ct102) ───────────
  build:
    name: Build plugins (Java 25)
    needs: seed-cache
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install Paper API + BungeeCord stubs
        uses: ./.github/actions/install-paper-api

      - name: Clear Maven negative-cache entries before build
        run: find ~/.m2 -name "*.lastUpdated" -delete 2>/dev/null || true

      - name: Build all plugins
        run: mvn -f plugins/pom.xml clean package -DskipTests --batch-mode --no-transfer-progress -q

      - name: Collect plugin JARs
        run: |
          mkdir -p /tmp/plugin-jars
          find plugins -path '*/target/*-*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-javadoc.jar' \
            | xargs -I{} cp {} /tmp/plugin-jars/ 2>/dev/null || true
          echo "=== JARs collected ==="
          ls /tmp/plugin-jars/ 2>/dev/null || echo "(none)"

      - name: Upload plugin JARs
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jars-${{ github.sha }}
          path: /tmp/plugin-jars/
          if-no-files-found: warn
          retention-days: 90
