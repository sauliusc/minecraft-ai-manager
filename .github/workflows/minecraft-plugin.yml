name: Minecraft Plugin CI

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/minecraft-plugin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/minecraft-plugin.yml'
  workflow_dispatch:    # allow manual builds from the GitHub Actions UI

jobs:
  build:
    name: Build plugins (Java 21)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all plugins
        run: mvn -f plugins/pom.xml clean package -DskipTests --batch-mode --no-transfer-progress

      # Collect only the shaded/final JARs — skip -sources and -javadoc
      - name: Collect plugin JARs
        run: |
          mkdir -p /tmp/plugin-jars
          find plugins -path '*/target/*-*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-javadoc.jar' \
            | xargs -I{} cp {} /tmp/plugin-jars/
          echo "=== Built JARs ==="
          ls -lh /tmp/plugin-jars/

      - name: Upload plugin JARs
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jars-${{ github.sha }}
          path: /tmp/plugin-jars/
          if-no-files-found: error
          retention-days: 90
