name: Minecraft Plugin CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/minecraft-plugin.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test all plugins
        run: mvn clean verify --batch-mode --no-transfer-progress
        working-directory: plugins

      - name: Upload plugin JARs
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jars
          path: plugins/*/target/*-*.jar
          if-no-files-found: ignore
