name: Minecraft Plugin CI

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/minecraft-plugin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/minecraft-plugin.yml'
  workflow_dispatch:    # allow manual builds from the GitHub Actions UI

jobs:
  build:
    name: Build plugins (Java 21)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # repo.papermc.io returns 403 from some CI environments.
      # We download the Paper server jar from the Downloads API instead and
      # install it as paper-api — the server jar is a superset of the API.
      - name: Install Paper API into local Maven repo
        id: paper-api
        run: |
          set -euo pipefail
          PAPER_VERSION="1.21.4"
          PAPER_MAVEN_VERSION="${PAPER_VERSION}-R0.1-SNAPSHOT"
          LOCAL_DIR="${HOME}/.m2/repository/io/papermc/paper/paper-api/${PAPER_MAVEN_VERSION}"

          # Fast path: already cached by actions/setup-java
          if find "${LOCAL_DIR}" -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | grep -q .; then
            echo "Paper API already in local Maven cache — skipping download"
            exit 0
          fi

          echo "--- Network diagnostics ---"
          curl -sf --max-time 5 "https://api.papermc.io/v2/projects/paper" \
            && echo "api.papermc.io: reachable" \
            || echo "api.papermc.io: UNREACHABLE (will try anyway)"

          echo "--- Fetching latest Paper ${PAPER_VERSION} build ---"
          BUILDS_JSON=$(curl -sf --max-time 30 \
            "https://api.papermc.io/v2/projects/paper/versions/${PAPER_VERSION}/builds")
          BUILD=$(echo "${BUILDS_JSON}" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['builds'][-1]['build'])")
          echo "Using Paper build ${BUILD}"

          JAR_NAME="paper-${PAPER_VERSION}-${BUILD}.jar"
          echo "--- Downloading ${JAR_NAME} ---"
          curl -sf --max-time 120 -L -o /tmp/paper.jar \
            "https://api.papermc.io/v2/projects/paper/versions/${PAPER_VERSION}/builds/${BUILD}/downloads/${JAR_NAME}"
          echo "Downloaded $(du -sh /tmp/paper.jar | cut -f1)"

          echo "--- Installing to local Maven repo ---"
          mvn install:install-file -q \
            -Dfile=/tmp/paper.jar \
            -DgroupId=io.papermc.paper \
            -DartifactId=paper-api \
            -Dversion="${PAPER_MAVEN_VERSION}" \
            -Dpackaging=jar
          echo "Installed paper-api ${PAPER_MAVEN_VERSION}"

      - name: Build all plugins
        # -nsu: skip remote SNAPSHOT update checks — use the locally installed paper-api
        run: mvn -f plugins/pom.xml clean package -DskipTests -nsu --batch-mode --no-transfer-progress

      # Collect only the shaded/final JARs — skip -sources and -javadoc
      - name: Collect plugin JARs
        run: |
          mkdir -p /tmp/plugin-jars
          find plugins -path '*/target/*-*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-javadoc.jar' \
            | xargs -I{} cp {} /tmp/plugin-jars/
          echo "=== Built JARs ==="
          ls -lh /tmp/plugin-jars/

      - name: Upload plugin JARs
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jars-${{ github.sha }}
          path: /tmp/plugin-jars/
          if-no-files-found: error
          retention-days: 90
