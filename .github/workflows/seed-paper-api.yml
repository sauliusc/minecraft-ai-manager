name: Seed Paper API Maven cache

# Runs on the ct102 self-hosted runner which has unrestricted network access to
# fill.papermc.io.  Downloads Paper 26.1.2, installs it to the local Maven repo,
# then saves that directory to the GHA cache so that ubuntu-latest jobs (which
# cannot reach fill.papermc.io) can restore it.
#
# Triggers:
#  • workflow_dispatch — run manually to bootstrap the cache after initial setup
#  • push to main that touches plugins/pom.xml or this file — keeps the cache
#    fresh whenever the Paper version changes

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'plugins/pom.xml'
      - '.github/workflows/seed-paper-api.yml'
      - '.github/actions/install-paper-api/**'

jobs:
  seed:
    name: Download & cache Paper API (ct102)
    runs-on: [self-hosted, ct102]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Clear Maven negative-cache entries
        run: find ~/.m2 -name "*.lastUpdated" -delete 2>/dev/null || true

      - name: Install Paper API + BungeeCord stubs
        uses: ./.github/actions/install-paper-api

      - name: Save Paper API JAR to GHA cache
        continue-on-error: true   # GHA cache service may not be reachable from ct102
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/io/papermc/paper/paper-api
          key: paper-api-26.1.2-R0.1-SNAPSHOT-Linux
