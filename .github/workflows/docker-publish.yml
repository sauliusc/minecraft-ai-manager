name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
      - 'plugins/**'
      - 'minecraft/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

concurrency:
  group: docker-publish
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/minecraft-ai-manager/api
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/minecraft-ai-manager/web
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-minecraft:
    name: Build Minecraft image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Pre-install Paper API (bypass repo.papermc.io CI restrictions)
        run: |
          set -euo pipefail
          # Clear stale Maven failure markers (Maven 3.9+ uses resolver-status.properties)
          rm -rf ~/.m2/repository/io/papermc 2>/dev/null || true

          # Download the Paperclip launcher JAR from the downloads API (different host, no 403)
          BUILD_INFO=$(curl -sf "https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds")
          BUILD=$(echo "$BUILD_INFO" | jq -r '.builds[-1].build')
          FILENAME=$(echo "$BUILD_INFO" | jq -r '.builds[-1].downloads.application.name')
          URL="https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/${BUILD}/downloads/${FILENAME}"
          echo "Downloading Paper 1.21.4 build ${BUILD} (${FILENAME})..."
          wget "$URL" -O paperclip.jar
          echo "Downloaded $(du -sh paperclip.jar | cut -f1)"

          # Check whether the downloaded JAR already has org.bukkit classes at the top level.
          # Paperclip 3.x bundles the actual server inside, so classes are NOT at the top level;
          # we must run it in patch-only mode to produce a usable compile-time JAR.
          HAS_BUKKIT=$(python3 -c "
          import zipfile, sys
          try:
              z = zipfile.ZipFile('paperclip.jar')
              print('yes' if any(n.startswith('org/bukkit') for n in z.namelist()) else 'no')
          except Exception as e:
              print('no')
          ")
          echo "Paperclip JAR has bukkit classes directly: $HAS_BUKKIT"

          if [ "$HAS_BUKKIT" = "yes" ]; then
            PAPER_API_JAR=paperclip.jar
          else
            echo "Running Paperclip in patch-only mode to produce the actual server JAR..."
            mkdir -p /tmp/paper-bootstrap
            cp paperclip.jar /tmp/paper-bootstrap/
            cd /tmp/paper-bootstrap
            # -Dpaperclip.patchonly=true makes Paperclip apply patches and exit without starting the server
            timeout 180 java -Dpaperclip.patchonly=true -jar paperclip.jar 2>&1 || true
            # Discover the patched JAR (largest new JAR created)
            PATCHED=$(find /tmp/paper-bootstrap -name "*.jar" ! -name "paperclip.jar" -size +1M \
              2>/dev/null | xargs ls -t 2>/dev/null | head -1)
            echo "Patched JAR found: ${PATCHED:-none}"
            cd -
            if [ -n "$PATCHED" ]; then
              PAPER_API_JAR="$PATCHED"
            else
              echo "WARNING: patch-only mode produced no output — falling back to paperclip.jar"
              PAPER_API_JAR=paperclip.jar
            fi
          fi

          echo "Using JAR for paper-api: $PAPER_API_JAR ($(du -sh "$PAPER_API_JAR"))"

          # Install as paper-api in local Maven repo so plugins compile against it
          mvn install:install-file \
            -Dfile="$PAPER_API_JAR" \
            -DgroupId=io.papermc.paper \
            -DartifactId=paper-api \
            -Dversion=1.21.4-R0.1-SNAPSHOT \
            -Dpackaging=jar \
            -DgeneratePom=true \
            --no-transfer-progress
          rm paperclip.jar

          # Redirect the papermc Maven repo to local so mvn never hits repo.papermc.io
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <mirrors>
              <mirror>
                <id>papermc-local</id>
                <mirrorOf>papermc</mirrorOf>
                <url>file://${user.home}/.m2/repository</url>
              </mirror>
            </mirrors>
          </settings>
          SETTINGS
          echo "Paper API installed at ~/.m2/repository/io/papermc/paper/paper-api/"

      - name: Build plugins
        run: |
          set -euo pipefail
          mkdir -p jars
          mvn -f plugins/pom.xml clean package -DskipTests --batch-mode --no-transfer-progress
          find plugins -path '*/target/*-*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-javadoc.jar' \
            -exec cp {} jars/ \; 2>/dev/null || true
          echo "=== Custom plugin JARs ==="
          ls -la jars/
          # Require BridgePlugin JAR — if it's missing the image will be broken
          ls jars/BridgePlugin-*.jar || { echo "::error::BridgePlugin JAR missing"; exit 1; }

      - name: Download third-party plugins
        run: bash minecraft/download-plugins.sh jars

      - name: List all plugin JARs for Docker
        run: |
          echo "=== All JARs for Docker image ==="
          ls -lh jars/*.jar 2>/dev/null || echo "(none)"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/minecraft-ai-manager/minecraft
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Minecraft image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: minecraft/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
