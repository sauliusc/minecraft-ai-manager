name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
      - 'plugins/**'
      - 'minecraft/**'
      - '.github/workflows/docker-publish.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
      - 'plugins/**'
      - 'minecraft/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

concurrency:
  group: docker-publish
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/minecraft-ai-manager/api
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/minecraft-ai-manager/web
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-minecraft:
    name: Build Minecraft image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Pre-install Paper API (bypass repo.papermc.io CI restrictions)
        continue-on-error: true
        run: |
          set -euo pipefail

          PAPER_VERSION="26.1.2-R0.1-SNAPSHOT"
          MC_VERSION="26.1.2"
          PAPER_INSTALLED="$HOME/.m2/repository/io/papermc/paper/paper-api/${PAPER_VERSION}/paper-api-${PAPER_VERSION}.jar"

          write_settings() {
            mkdir -p ~/.m2
            cat > ~/.m2/settings.xml << 'SETTINGS'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <mirrors>
              <mirror>
                <id>papermc-local</id>
                <mirrorOf>papermc</mirrorOf>
                <url>file://${user.home}/.m2/repository</url>
              </mirror>
              <mirror>
                <id>spigotmc-local</id>
                <mirrorOf>spigotmc-snapshots</mirrorOf>
                <url>file://${user.home}/.m2/repository</url>
              </mirror>
            </mirrors>
          </settings>
          SETTINGS
          }

          if [ -f "$PAPER_INSTALLED" ]; then
            echo "::notice::Paper API already installed, writing settings.xml and skipping download"
            write_settings
            exit 0
          fi

          # Fill v3 API — v2 stopped receiving new builds Dec 31 2025
          PAPERMC_UA="craftcontrol-preinstall/1.0 (https://github.com/sauliusc/minecraft-ai-manager)"
          echo "Fetching Paper build info for MC ${MC_VERSION} via Fill v3 API…"
          BUILD_INFO=$(curl -sf --max-time 20 \
            -H "User-Agent: ${PAPERMC_UA}" \
            "https://fill.papermc.io/v3/projects/paper/versions/${MC_VERSION}/builds") || {
            echo "::error::Fill v3 API returned an error for version '${MC_VERSION}'."
            echo "::error::Check https://fill.papermc.io/v3/projects/paper/versions for valid versions."
            exit 1
          }
          URL=$(echo "$BUILD_INFO" | jq -r '[.[] | select(.channel == "STABLE")] | last | .downloads."server:default".url')
          BUILD=$(echo "$BUILD_INFO" | jq -r '[.[] | select(.channel == "STABLE")] | last | .build')
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "::error::No STABLE build found for Paper ${MC_VERSION} in Fill v3 API"
            exit 1
          fi
          echo "::notice::build=${BUILD} url=${URL}"

          curl -fsSL --max-time 300 -H "User-Agent: ${PAPERMC_UA}" -o paperclip.jar "$URL"
          echo "::notice::downloaded size=$(du -sh paperclip.jar | cut -f1)"

          WORKSPACE=$(pwd)
          mkdir -p /tmp/paper-extract
          cd /tmp/paper-extract
          ENTRIES=$(jar tf "$WORKSPACE/paperclip.jar" 2>/dev/null \
            | grep -E "META-INF/libraries/.*\.jar$" \
            | grep -Ev "sources|javadoc" || true)
          while IFS= read -r entry; do
            [ -n "$entry" ] || continue
            jar xf "$WORKSPACE/paperclip.jar" "$entry" 2>/dev/null || true
          done <<< "$ENTRIES"
          cd -

          PAPER_API_JAR=$(find /tmp/paper-extract -name "paper-api-*.jar" \
            ! -name "*-sources.jar" ! -name "*-javadoc.jar" 2>/dev/null | head -1 || true)
          echo "::notice::paper-api jar=${PAPER_API_JAR:-NONE}"
          [ -n "$PAPER_API_JAR" ] || { echo "::error::paper-api JAR not found in bundler"; exit 1; }

          mkdir -p /tmp/uber-api
          cd /tmp/uber-api
          jar xf "$PAPER_API_JAR"
          while IFS= read -r ajar; do
            jar xf "$ajar" 2>/dev/null || true
          done < <(find /tmp/paper-extract -path "*/net/kyori/*.jar" \
            ! -name "*-sources.jar" ! -name "*-javadoc.jar" 2>/dev/null)
          cd -
          jar cf /tmp/paper-api-uber.jar -C /tmp/uber-api .
          rm paperclip.jar
          echo "::notice::uber-jar size=$(du -sh /tmp/paper-api-uber.jar)"

          mvn install:install-file \
            -Dfile="/tmp/paper-api-uber.jar" \
            -DgroupId=io.papermc.paper \
            -DartifactId=paper-api \
            -Dversion="${PAPER_VERSION}" \
            -Dpackaging=jar \
            -DgeneratePom=true \
            --no-transfer-progress
          echo "::notice::installed=$(du -sh "$PAPER_INSTALLED" 2>/dev/null || echo MISSING)"

          # Write settings.xml ONLY after JAR is confirmed installed.
          # Writing it earlier and then failing leaves Maven pointing at an empty
          # local mirror, causing a cached negative-resolution failure.
          write_settings

      - name: Pre-install BungeeCord Chat stubs (not in Paper bundler)
        continue-on-error: true
        run: |
          set -euo pipefail
          # bungeecord-chat:26.1.2-R0.1-SNAPSHOT is Paper's private build at repo.papermc.io
          # (blocked on GHA runners) and is absent from the Paperclip bundler libraries.
          # paper-api method signatures reference these types, so the compiler needs them.
          # We create minimal compile-only stubs; they are 'provided' scope and never
          # shipped in plugin JARs.
          rm -rf ~/.m2/repository/net/md_5/bungee/bungeecord-chat 2>/dev/null || true

          mkdir -p /tmp/bungee-src/net/md_5/bungee/api/chat \
                   /tmp/bungee-src/net/md_5/bungee/api \
                   /tmp/bungee-src/net/md_5/bungee/chat \
                   /tmp/bungee-classes

          cat > /tmp/bungee-src/net/md_5/bungee/api/ChatColor.java << 'JAVASRC'
          package net.md_5.bungee.api;
          public enum ChatColor {
              BLACK, DARK_BLUE, DARK_GREEN, DARK_AQUA, DARK_RED, DARK_PURPLE,
              GOLD, GRAY, DARK_GRAY, BLUE, GREEN, AQUA, RED, LIGHT_PURPLE,
              YELLOW, WHITE, MAGIC, BOLD, STRIKETHROUGH, UNDERLINE, ITALIC, RESET;
              public static ChatColor of(String s) { return WHITE; }
              public static String stripColor(String in) { return in; }
              public static String translateAlternateColorCodes(char c, String s) { return s; }
              public char getChar() { return '\0'; }
              public boolean isColor() { return true; }
              public boolean isFormat() { return false; }
              public String getName() { return name().toLowerCase(); }
          }
          JAVASRC

          cat > /tmp/bungee-src/net/md_5/bungee/api/ChatMessageType.java << 'JAVASRC'
          package net.md_5.bungee.api;
          public enum ChatMessageType { CHAT, SYSTEM, ACTION_BAR }
          JAVASRC

          cat > /tmp/bungee-src/net/md_5/bungee/api/chat/BaseComponent.java << 'JAVASRC'
          package net.md_5.bungee.api.chat;
          import java.util.List;
          public abstract class BaseComponent implements java.io.Serializable, Cloneable {
              public abstract BaseComponent duplicate();
              public String toLegacyText() { return ""; }
              public String toPlainText() { return ""; }
              public List<BaseComponent> getExtra() { return null; }
              public void addExtra(BaseComponent component) {}
              public void addExtra(String text) {}
              public boolean hasFormatting() { return false; }
          }
          JAVASRC

          cat > /tmp/bungee-src/net/md_5/bungee/api/chat/TextComponent.java << 'JAVASRC'
          package net.md_5.bungee.api.chat;
          public class TextComponent extends BaseComponent {
              public TextComponent() {}
              public TextComponent(String text) {}
              public TextComponent(BaseComponent... extra) {}
              @Override public BaseComponent duplicate() { return new TextComponent(); }
          }
          JAVASRC

          cat > /tmp/bungee-src/net/md_5/bungee/api/chat/ClickEvent.java << 'JAVASRC'
          package net.md_5.bungee.api.chat;
          import java.io.Serializable;
          public final class ClickEvent implements Serializable {
              public ClickEvent(Action a, String v) {}
              public enum Action { OPEN_URL, OPEN_FILE, RUN_COMMAND, SUGGEST_COMMAND, CHANGE_PAGE, COPY_TO_CLIPBOARD }
          }
          JAVASRC

          cat > /tmp/bungee-src/net/md_5/bungee/api/chat/HoverEvent.java << 'JAVASRC'
          package net.md_5.bungee.api.chat;
          import java.io.Serializable;
          public final class HoverEvent implements Serializable {
              public HoverEvent(Action a, BaseComponent... v) {}
              public enum Action { SHOW_TEXT, SHOW_ACHIEVEMENT, SHOW_ITEM, SHOW_ENTITY }
          }
          JAVASRC

          cat > /tmp/bungee-src/net/md_5/bungee/api/chat/ComponentBuilder.java << 'JAVASRC'
          package net.md_5.bungee.api.chat;
          public final class ComponentBuilder {
              public ComponentBuilder(String text) {}
              public ComponentBuilder(BaseComponent orig) {}
              public ComponentBuilder append(String text) { return this; }
              public ComponentBuilder append(BaseComponent component) { return this; }
              public BaseComponent[] create() { return null; }
              public enum FormatRetention { NONE, ALL, FORMATTING, EVENTS }
          }
          JAVASRC

          cat > /tmp/bungee-src/net/md_5/bungee/chat/ComponentSerializer.java << 'JAVASRC'
          package net.md_5.bungee.chat;
          public class ComponentSerializer {
              public static net.md_5.bungee.api.chat.BaseComponent[] parse(String j) { return null; }
              public static String toString(net.md_5.bungee.api.chat.BaseComponent... c) { return ""; }
          }
          JAVASRC

          javac -d /tmp/bungee-classes \
            /tmp/bungee-src/net/md_5/bungee/api/ChatColor.java \
            /tmp/bungee-src/net/md_5/bungee/api/ChatMessageType.java \
            /tmp/bungee-src/net/md_5/bungee/api/chat/BaseComponent.java \
            /tmp/bungee-src/net/md_5/bungee/api/chat/ClickEvent.java \
            /tmp/bungee-src/net/md_5/bungee/api/chat/HoverEvent.java \
            /tmp/bungee-src/net/md_5/bungee/api/chat/TextComponent.java \
            /tmp/bungee-src/net/md_5/bungee/api/chat/ComponentBuilder.java \
            /tmp/bungee-src/net/md_5/bungee/chat/ComponentSerializer.java
          jar cf /tmp/bungeecord-chat-stub.jar -C /tmp/bungee-classes .
          echo "::notice::step=bungee-stubs size=$(du -sh /tmp/bungeecord-chat-stub.jar | cut -f1)"
          mvn install:install-file \
            -Dfile="/tmp/bungeecord-chat-stub.jar" \
            -DgroupId=net.md_5.bungee \
            -DartifactId=bungeecord-chat \
            -Dversion=26.1.2-R0.1-SNAPSHOT \
            -Dpackaging=jar \
            -DgeneratePom=true \
            --no-transfer-progress

      - name: Clear Maven negative-cache entries before build
        run: find ~/.m2 -name "*.lastUpdated" -delete 2>/dev/null || true

      - name: Build plugins
        run: |
          mkdir -p jars
          # Maven build — non-fatal: Paper API may be unavailable on GHA runners
          mvn -f plugins/pom.xml clean package -DskipTests --batch-mode --no-transfer-progress \
            --no-snapshot-updates 2>&1 | tee /tmp/mvn-build.txt || {
            grep "^\[ERROR\]" /tmp/mvn-build.txt | head -30 | while IFS= read -r line; do
              echo "::warning::${line:0:250}"
            done
            echo "::warning::Plugin build failed — custom plugins will not be in the Docker image (Paper API likely unreachable from GHA)"
          }
          find plugins -path '*/target/*-*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-javadoc.jar' \
            ! -name 'original-*' \
            -exec cp {} jars/ \; 2>/dev/null || true
          echo "=== Custom plugin JARs ==="
          ls -la jars/ 2>/dev/null || echo "(none)"
          ls jars/BridgePlugin-*.jar 2>/dev/null || echo "::warning::BridgePlugin JAR missing — image built without custom plugins"

      - name: Download third-party plugins
        run: bash minecraft/download-plugins.sh jars

      - name: List all plugin JARs for Docker
        run: |
          echo "=== All JARs for Docker image ==="
          ls -lh jars/*.jar 2>/dev/null || echo "(none)"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/minecraft-ai-manager/minecraft
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Minecraft image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: minecraft/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
