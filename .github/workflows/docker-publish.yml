name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
      - 'plugins/**'
      - 'minecraft/**'
      - '.github/workflows/docker-publish.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
      - 'plugins/**'
      - 'minecraft/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

concurrency:
  group: docker-publish
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/minecraft-ai-manager/api
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/minecraft-ai-manager/web
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-minecraft:
    name: Build Minecraft image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Pre-install Paper API (bypass repo.papermc.io CI restrictions)
        run: |
          set -euo pipefail
          rm -rf ~/.m2/repository/io/papermc 2>/dev/null || true

          # Download the Paper bundler JAR (api.papermc.io works; repo.papermc.io returns 403 on CI)
          BUILD_INFO=$(curl -sf "https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds")
          BUILD=$(echo "$BUILD_INFO" | jq -r '.builds[-1].build')
          FILENAME=$(echo "$BUILD_INFO" | jq -r '.builds[-1].downloads.application.name')
          URL="https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/${BUILD}/downloads/${FILENAME}"
          echo "Downloading Paper 1.21.4 build ${BUILD}..."
          wget -q "$URL" -O paperclip.jar
          echo "Downloaded $(du -sh paperclip.jar | cut -f1)"

          # Use unzip (supports glob patterns) to extract only META-INF/libraries/ from bundler.
          # 'jar xf' does NOT support directory-prefix extraction; unzip does.
          echo "Extracting bundler libraries..."
          unzip -q paperclip.jar "META-INF/libraries/*" -d /tmp/paper-extract 2>/dev/null || true
          LIB_COUNT=$(find /tmp/paper-extract/META-INF/libraries -name "*.jar" 2>/dev/null | wc -l)
          echo "::notice::extracted $LIB_COUNT JARs from bundler"

          # Find the paper-api JAR in the extracted libraries
          PAPER_API_JAR=$(find /tmp/paper-extract/META-INF/libraries -name "paper-api-*.jar" \
            ! -name "*-sources.jar" ! -name "*-javadoc.jar" 2>/dev/null | head -1 || true)
          echo "::notice::paper-api JAR: ${PAPER_API_JAR:-none}"
          [ -n "$PAPER_API_JAR" ] || { echo "::error::paper-api JAR not found in bundler"; exit 1; }

          # Build a compile-ready uber-jar: paper-api classes + all net.kyori (Adventure) classes.
          # The bundler ships JARs without POMs, so a generated blank POM omits Adventure from
          # the compile classpath. Merging Adventure directly into the installed JAR sidesteps POM.
          mkdir -p /tmp/uber-api
          cd /tmp/uber-api
          jar xf "$PAPER_API_JAR"
          while IFS= read -r ajar; do
            jar xf "$ajar" 2>/dev/null || true
          done < <(find /tmp/paper-extract/META-INF/libraries/net/kyori \
            -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" 2>/dev/null)
          cd -
          jar cf /tmp/paper-api-uber.jar -C /tmp/uber-api .
          rm paperclip.jar

          BUKKIT=$(jar tf /tmp/paper-api-uber.jar 2>/dev/null | grep -c "^org/bukkit" || true)
          CFG=$(jar tf /tmp/paper-api-uber.jar 2>/dev/null | grep -c "org/bukkit/configuration/file" || true)
          ADV=$(jar tf /tmp/paper-api-uber.jar 2>/dev/null | grep -c "net/kyori/adventure" || true)
          echo "::notice::paper-api-uber: size=$(du -sh /tmp/paper-api-uber.jar) bukkit=$BUKKIT config=$CFG adventure=$ADV"

          mvn install:install-file \
            -Dfile="/tmp/paper-api-uber.jar" \
            -DgroupId=io.papermc.paper \
            -DartifactId=paper-api \
            -Dversion=1.21.4-R0.1-SNAPSHOT \
            -Dpackaging=jar \
            -DgeneratePom=true \
            --no-transfer-progress

          # Redirect the papermc Maven repo to local so mvn never hits repo.papermc.io
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <mirrors>
              <mirror>
                <id>papermc-local</id>
                <mirrorOf>papermc</mirrorOf>
                <url>file://${user.home}/.m2/repository</url>
              </mirror>
            </mirrors>
          </settings>
          SETTINGS
          INSTALLED=~/.m2/repository/io/papermc/paper/paper-api/1.21.4-R0.1-SNAPSHOT/paper-api-1.21.4-R0.1-SNAPSHOT.jar
          echo "::notice::installed paper-api: $(du -sh $INSTALLED 2>/dev/null || echo MISSING)"

      - name: Build plugins
        run: |
          set -euo pipefail
          mkdir -p jars
          # Capture Maven output so ERROR lines can be emitted as annotations on failure
          mvn -f plugins/pom.xml clean package -DskipTests --batch-mode --no-transfer-progress \
            --no-snapshot-updates 2>&1 | tee /tmp/mvn-build.txt || {
            grep "^\[ERROR\]" /tmp/mvn-build.txt | head -30 | while IFS= read -r line; do
              echo "::error::${line:0:250}"
            done
            exit 1
          }
          find plugins -path '*/target/*-*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-javadoc.jar' \
            -exec cp {} jars/ \; 2>/dev/null || true
          echo "=== Custom plugin JARs ==="
          ls -la jars/
          # Require BridgePlugin JAR — if it's missing the image will be broken
          ls jars/BridgePlugin-*.jar || { echo "::error::BridgePlugin JAR missing"; exit 1; }

      - name: Download third-party plugins
        run: bash minecraft/download-plugins.sh jars

      - name: List all plugin JARs for Docker
        run: |
          echo "=== All JARs for Docker image ==="
          ls -lh jars/*.jar 2>/dev/null || echo "(none)"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/minecraft-ai-manager/minecraft
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Minecraft image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: minecraft/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
