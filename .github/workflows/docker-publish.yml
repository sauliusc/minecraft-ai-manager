name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
      - 'plugins/**'
      - 'minecraft/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

concurrency:
  group: docker-publish
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/minecraft-ai-manager/api
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/minecraft-ai-manager/web
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-minecraft:
    name: Build Minecraft image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Pre-install Paper API (bypass repo.papermc.io CI restrictions)
        run: |
          set -euo pipefail
          # Clear stale Maven failure markers (Maven 3.9+ uses resolver-status.properties)
          rm -rf ~/.m2/repository/io/papermc 2>/dev/null || true

          # Download the Paper bundler JAR from the downloads API (different host, no 403)
          BUILD_INFO=$(curl -sf "https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds")
          BUILD=$(echo "$BUILD_INFO" | jq -r '.builds[-1].build')
          FILENAME=$(echo "$BUILD_INFO" | jq -r '.builds[-1].downloads.application.name')
          URL="https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/${BUILD}/downloads/${FILENAME}"
          echo "Downloading Paper 1.21.4 build ${BUILD} (${FILENAME})..."
          wget "$URL" -O paperclip.jar
          echo "Downloaded $(du -sh paperclip.jar | cut -f1)"

          # Strategy 1: Extract paper-api JAR embedded in the bundler's META-INF/libraries/.
          # Paper's bundler format (Paperclip 3.x) embeds all Maven dependencies there,
          # including the compile-time paper-api artifact with the full Bukkit API.
          BUNDLED_API=$(jar tf paperclip.jar 2>/dev/null \
            | grep -E "paper-api[^/]*\.jar$" \
            | grep -v sources | grep -v javadoc \
            | head -1 || true)
          echo "::notice::bundled paper-api entry: ${BUNDLED_API:-none}"

          if [ -n "$BUNDLED_API" ]; then
            echo "Extracting paper-api from bundler at: $BUNDLED_API"
            mkdir -p /tmp/paper-extract
            cd /tmp/paper-extract
            jar xf "$OLDPWD/paperclip.jar" "$BUNDLED_API"
            PAPER_API_JAR="/tmp/paper-extract/$BUNDLED_API"
            cd -
          else
            # Strategy 2: Run Paperclip in accumulate mode — it writes libraries to the cache dir.
            # The paper-api JAR will appear under cache/io/papermc/paper/paper-api/.
            echo "paper-api not found directly in bundler; running Paperclip to populate cache..."
            mkdir -p /tmp/paper-bootstrap
            cp paperclip.jar /tmp/paper-bootstrap/
            cd /tmp/paper-bootstrap
            timeout 180 java \
              -Dpaperclip.patchonly=true \
              -Dbundlerrepo.target=/tmp/paper-bootstrap/cache \
              -jar paperclip.jar 2>&1 || true
            PAPER_API_JAR=$(find /tmp/paper-bootstrap/cache -name "paper-api-*.jar" \
              ! -name "*-sources.jar" ! -name "*-javadoc.jar" \
              2>/dev/null | head -1 || true)
            echo "Cache-extracted paper-api: ${PAPER_API_JAR:-none}"
            cd -

            if [ -z "$PAPER_API_JAR" ]; then
              echo "::error::Could not locate paper-api JAR — neither bundled nor cache-extracted"
              exit 1
            fi
          fi

          echo "Using JAR for paper-api: $PAPER_API_JAR ($(du -sh "$PAPER_API_JAR"))"

          # Verify the JAR has the expected Bukkit API packages
          BUKKIT_COUNT=$(jar tf "$PAPER_API_JAR" 2>/dev/null | grep -c "^org/bukkit" || true)
          PAPER_COUNT=$(jar tf "$PAPER_API_JAR" 2>/dev/null | grep -c "^io/papermc" || true)
          HAS_CONFIG=$(jar tf "$PAPER_API_JAR" 2>/dev/null | grep -c "org/bukkit/configuration/file" || true)
          echo "::notice::paper-api: size=$(du -sh $PAPER_API_JAR) bukkit_entries=$BUKKIT_COUNT paper_entries=$PAPER_COUNT config_pkg=$HAS_CONFIG"

          # Install as paper-api in local Maven repo so plugins compile against it
          mvn install:install-file \
            -Dfile="$PAPER_API_JAR" \
            -DgroupId=io.papermc.paper \
            -DartifactId=paper-api \
            -Dversion=1.21.4-R0.1-SNAPSHOT \
            -Dpackaging=jar \
            -DgeneratePom=true \
            --no-transfer-progress
          rm paperclip.jar

          # Redirect the papermc Maven repo to local so mvn never hits repo.papermc.io
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <mirrors>
              <mirror>
                <id>papermc-local</id>
                <mirrorOf>papermc</mirrorOf>
                <url>file://${user.home}/.m2/repository</url>
              </mirror>
            </mirrors>
          </settings>
          SETTINGS
          # Verify installed paper-api JAR is non-empty
          INSTALLED=~/.m2/repository/io/papermc/paper/paper-api/1.21.4-R0.1-SNAPSHOT/paper-api-1.21.4-R0.1-SNAPSHOT.jar
          INSTALLED_SIZE=$(du -sh "$INSTALLED" 2>/dev/null || echo "MISSING")
          echo "::notice::installed paper-api: $INSTALLED_SIZE"
          echo "Paper API installed at ~/.m2/repository/io/papermc/paper/paper-api/"

      - name: Build plugins
        run: |
          set -euo pipefail
          mkdir -p jars
          # Capture Maven output so ERROR lines can be emitted as annotations on failure
          mvn -f plugins/pom.xml clean package -DskipTests --batch-mode --no-transfer-progress \
            --no-snapshot-updates 2>&1 | tee /tmp/mvn-build.txt || {
            grep "^\[ERROR\]" /tmp/mvn-build.txt | head -30 | while IFS= read -r line; do
              echo "::error::${line:0:250}"
            done
            exit 1
          }
          find plugins -path '*/target/*-*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-javadoc.jar' \
            -exec cp {} jars/ \; 2>/dev/null || true
          echo "=== Custom plugin JARs ==="
          ls -la jars/
          # Require BridgePlugin JAR — if it's missing the image will be broken
          ls jars/BridgePlugin-*.jar || { echo "::error::BridgePlugin JAR missing"; exit 1; }

      - name: Download third-party plugins
        run: bash minecraft/download-plugins.sh jars

      - name: List all plugin JARs for Docker
        run: |
          echo "=== All JARs for Docker image ==="
          ls -lh jars/*.jar 2>/dev/null || echo "(none)"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/minecraft-ai-manager/minecraft
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Minecraft image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: minecraft/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
