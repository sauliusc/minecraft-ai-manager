name: Deploy V2 (Docker Compose)

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow one-click manual deploy from GitHub UI

concurrency:
  group: deploy-v2
  cancel-in-progress: false  # never cancel a running deploy mid-flight

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Run tests before deploying
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       craftcontrol_test
          POSTGRES_USER:     craftcontrol
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql://craftcontrol:test_password@localhost:5432/craftcontrol_test
      REDIS_URL:    redis://localhost:6379
      JWT_SECRET:          ci-test-secret-do-not-use-in-production
      JWT_REFRESH_SECRET:  ci-test-refresh-secret-do-not-use-in-production
      MINECRAFT_BRIDGE_URL: http://localhost:25580
      NODE_ENV: test
      PORT: 3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma db push --force-reset --accept-data-loss
      - run: npm test

  # ────────────────────────────────────────────────────────────────────────────
  # Build plugin JARs on ct102 (has unrestricted access to fill.papermc.io).
  # fill.papermc.io is blocked on standard GitHub-hosted runners, so we compile
  # here and pass the JARs to the ubuntu-latest build job via artifact.
  # ────────────────────────────────────────────────────────────────────────────
  build-plugins:
    name: Build plugin JARs (ct102)
    needs: test
    runs-on: [self-hosted, ct102]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Clear Maven negative-cache entries
        run: find ~/.m2 -name "*.lastUpdated" -delete 2>/dev/null || true

      - name: Install Paper API + BungeeCord stubs
        uses: ./.github/actions/install-paper-api

      - name: Ensure Maven is available
        run: |
          if command -v mvn &>/dev/null; then
            echo "Maven already on PATH: $(mvn --version 2>&1 | head -1)"
          else
            echo "mvn not in PATH — downloading Apache Maven 3.9.9"
            curl -fsSL -o /tmp/maven.tar.gz \
              "https://archive.apache.org/dist/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz"
            tar -xzf /tmp/maven.tar.gz -C "${HOME}"
            rm /tmp/maven.tar.gz
            echo "${HOME}/apache-maven-3.9.9/bin" >> "$GITHUB_PATH"
            echo "Installed: $("${HOME}/apache-maven-3.9.9/bin/mvn" --version 2>&1 | head -1)"
          fi

      - name: Build plugin JARs
        run: mvn -f plugins/pom.xml clean package -DskipTests -q

      - name: Collect plugin JARs
        run: |
          mkdir -p /tmp/plugin-jars
          find plugins -name '*-*.jar' -path '*/target/*' \
            ! -name '*-sources.jar' ! -name '*-javadoc.jar' \
            ! -name 'original-*' \
            -exec cp {} /tmp/plugin-jars/ \; 2>/dev/null || true
          echo "=== Plugin JARs ==="
          ls -la /tmp/plugin-jars/

      - name: Upload plugin JARs artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jars-${{ github.sha }}
          path: /tmp/plugin-jars/
          if-no-files-found: error
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # Build all Docker images on GitHub and push to GHCR
  # Plugin JARs are downloaded from the artifact produced by build-plugins
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    needs: [test, build-plugins]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      # ── Download pre-built plugin JARs from ct102 build job ──────────────
      - name: Download plugin JARs artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-jars-${{ github.sha }}
          path: jars/

      - name: List staged plugin JARs
        run: |
          echo "=== Plugin JARs staged for Docker ==="
          ls -la jars/

      # ── Docker setup ────────────────────────────────────────────────────────
      - name: Set image tag (short SHA)
        id: tag
        run: echo "value=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & push each image ─────────────────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: server
          push: true
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max
          tags: |
            ghcr.io/sauliusc/minecraft-ai-manager/api:${{ steps.tag.outputs.value }}
            ghcr.io/sauliusc/minecraft-ai-manager/api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: client
          push: true
          build-args: VITE_API_BASE_URL=/api
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max
          tags: |
            ghcr.io/sauliusc/minecraft-ai-manager/web:${{ steps.tag.outputs.value }}
            ghcr.io/sauliusc/minecraft-ai-manager/web:latest

      - name: Build and push MCP image
        uses: docker/build-push-action@v5
        with:
          context: mcp
          push: true
          cache-from: type=gha,scope=mcp
          cache-to:   type=gha,scope=mcp,mode=max
          tags: |
            ghcr.io/sauliusc/minecraft-ai-manager/mcp:${{ steps.tag.outputs.value }}
            ghcr.io/sauliusc/minecraft-ai-manager/mcp:latest

      - name: Build and push Minecraft image (includes plugin JARs)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: minecraft/Dockerfile
          push: true
          cache-from: type=gha,scope=minecraft
          cache-to:   type=gha,scope=minecraft,mode=max
          tags: |
            ghcr.io/sauliusc/minecraft-ai-manager/minecraft:${{ steps.tag.outputs.value }}
            ghcr.io/sauliusc/minecraft-ai-manager/minecraft:latest

  # ────────────────────────────────────────────────────────────────────────────
  # Pull pre-built images and start all services on CT102
  # No building on the server — just docker compose pull + up
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: [self-hosted, ct102]

    steps:
      - name: Pull latest config & deploy
        env:
          IMAGE_TAG:    ${{ needs.build.outputs.image_tag }}
          TRIGGERED_BY: ${{ github.actor }}
          DEPLOY_NOTES: ${{ github.event.head_commit.message || github.sha }}
        run: |
          set -euo pipefail

          # Update docker-compose.yml and scripts from the repo
          git -C /opt/craftcontrol fetch origin main
          git -C /opt/craftcontrol reset --hard origin/main

          # Authenticate with GHCR so private packages can be pulled
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          export IMAGE_TAG TRIGGERED_BY DEPLOY_NOTES
          bash /opt/craftcontrol/deploymentV2/scripts/deploy.sh

  # ────────────────────────────────────────────────────────────────────────────
  # Validate Minecraft startup — all logs visible inline in GitHub Actions UI
  # ────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate Minecraft startup
    needs: deploy
    runs-on: [self-hosted, ct102]
    timeout-minutes: 5

    steps:
      - name: Wait for Paper + plugins to initialise
        run: sleep 90

      - name: Stream Minecraft startup logs
        run: |
          echo "════════════════════ Minecraft startup log ════════════════════"
          docker compose -f /opt/craftcontrol/deploymentV2/docker-compose.yml \
            --env-file /opt/craftcontrol/deploymentV2/.env \
            logs --no-color --tail 500 minecraft 2>&1 | tee /tmp/mc-startup.log
          echo "════════════════════════════════════════════════════════════════"

      - name: Stream API startup logs
        run: |
          echo "════════════════════════ API startup log ════════════════════════"
          docker compose -f /opt/craftcontrol/deploymentV2/docker-compose.yml \
            --env-file /opt/craftcontrol/deploymentV2/.env \
            logs --no-color --tail 100 api 2>&1
          echo "═════════════════════════════════════════════════════════════════"

      - name: Annotate errors
        run: |
          # Paper log format: [HH:MM:SS WARN]: and [HH:MM:SS ERROR]:
          WARNS=$(grep -E " WARN\]:" /tmp/mc-startup.log || true)
          ERRORS=$(grep -E " ERROR\]:" /tmp/mc-startup.log || true)

          while IFS= read -r line; do
            [ -n "$line" ] && echo "::warning::$line"
          done <<< "$WARNS"

          if [ -n "$ERRORS" ]; then
            while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::$line"
            done <<< "$ERRORS"
            echo "❌ Errors found in Minecraft startup logs — see annotations above."
            exit 1
          fi

          echo "✅ No errors in Minecraft startup logs."

      - name: Verify custom plugins loaded
        run: |
          # Plugin remap failures appear as stack traces (not [ERROR]: lines),
          # so the previous step would miss them. Check explicitly.
          REMAP_FAIL=$(grep -c "Failed to remap plugin jar" /tmp/mc-startup.log || true)
          if [ "$REMAP_FAIL" -gt 0 ]; then
            echo "::error::${REMAP_FAIL} plugin(s) failed to remap — class file version mismatch?"
            grep "Failed to remap plugin jar" /tmp/mc-startup.log | \
              while IFS= read -r line; do echo "::error::${line}"; done
            exit 1
          fi

          # Verify each custom plugin initialised successfully.
          MISSING=""
          for PLUGIN in BridgePlugin GreeterPlugin ChallengePlugin RewardPlugin \
                        StreakPlugin EconomyPlugin ClanPlugin QuestPlugin \
                        CosmeticsPlugin EventPlugin VotePlugin ModerationPlugin NpcPlugin; do
            if ! grep -qE "\[${PLUGIN}\]" /tmp/mc-startup.log; then
              MISSING="${MISSING} ${PLUGIN}"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "::error::Custom plugins that did not appear in startup log:${MISSING}"
            exit 1
          fi

          echo "✅ All custom plugins loaded successfully."

      - name: Upload full log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-startup-log
          path: /tmp/mc-startup.log
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Open a GitHub issue automatically when any part of the pipeline fails.
  # This ensures post-merge failures are visible and actionable without manual
  # polling of the main branch workflow runs.
  # ────────────────────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    needs: [test, build-plugins, build, deploy, validate]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Open GitHub issue for failed deploy
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const shortSha = context.sha.substring(0, 7)
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 deploy-v2 failed on ${shortSha}`,
              body: [
                `The **deploy-v2** workflow failed after merging to \`main\`.`,
                ``,
                `**Commit:** \`${context.sha}\``,
                `**Triggered by:** ${context.actor}`,
                `**Run:** ${runUrl}`,
                ``,
                `Check the run logs to identify which job failed (Tests / Build / Deploy / Validate).`,
              ].join('\n'),
              labels: ['bug', 'ci'],
            })
