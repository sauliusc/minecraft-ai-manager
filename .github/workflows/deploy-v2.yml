name: Deploy V2 (Docker Compose)

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow one-click manual deploy from GitHub UI

concurrency:
  group: deploy-v2
  cancel-in-progress: false  # never cancel a running deploy mid-flight

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Run tests before deploying
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       craftcontrol_test
          POSTGRES_USER:     craftcontrol
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql://craftcontrol:test_password@localhost:5432/craftcontrol_test
      REDIS_URL:    redis://localhost:6379
      JWT_SECRET:          ci-test-secret-do-not-use-in-production
      JWT_REFRESH_SECRET:  ci-test-refresh-secret-do-not-use-in-production
      MINECRAFT_BRIDGE_URL: http://localhost:25580
      NODE_ENV: test
      PORT: 3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma db push --force-reset --accept-data-loss
      - run: npm test

  # ────────────────────────────────────────────────────────────────────────────
  # Build all Docker images on GitHub and push to GHCR
  # Includes: plugin JARs (Maven) baked into the minecraft image
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      # ── Build plugin JARs and stage for minecraft image ───────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build plugin JARs
        run: mvn -f plugins/pom.xml clean package -DskipTests -q

      - name: Stage JARs into jars/ (picked up by minecraft/Dockerfile)
        run: |
          find plugins -name '*-*.jar' -path '*/target/*' \
            ! -name '*-sources.jar' ! -name '*-javadoc.jar' \
            -exec cp {} jars/ \;
          echo "Staged JARs:"
          ls -la jars/

      # ── Docker setup ────────────────────────────────────────────────────────
      - name: Set image tag (short SHA)
        id: tag
        run: echo "value=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & push each image ─────────────────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: server
          push: true
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max
          tags: |
            ghcr.io/sauliusc/minecraft-ai-manager/api:${{ steps.tag.outputs.value }}
            ghcr.io/sauliusc/minecraft-ai-manager/api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: client
          push: true
          build-args: VITE_API_BASE_URL=/api
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max
          tags: |
            ghcr.io/sauliusc/minecraft-ai-manager/web:${{ steps.tag.outputs.value }}
            ghcr.io/sauliusc/minecraft-ai-manager/web:latest

      - name: Build and push MCP image
        uses: docker/build-push-action@v5
        with:
          context: mcp
          push: true
          cache-from: type=gha,scope=mcp
          cache-to:   type=gha,scope=mcp,mode=max
          tags: |
            ghcr.io/sauliusc/minecraft-ai-manager/mcp:${{ steps.tag.outputs.value }}
            ghcr.io/sauliusc/minecraft-ai-manager/mcp:latest

      - name: Build and push Minecraft image (includes plugin JARs)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: minecraft/Dockerfile
          push: true
          cache-from: type=gha,scope=minecraft
          cache-to:   type=gha,scope=minecraft,mode=max
          tags: |
            ghcr.io/sauliusc/minecraft-ai-manager/minecraft:${{ steps.tag.outputs.value }}
            ghcr.io/sauliusc/minecraft-ai-manager/minecraft:latest

  # ────────────────────────────────────────────────────────────────────────────
  # Pull pre-built images and start all services on CT102
  # No building on the server — just docker compose pull + up
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: [self-hosted, ct102]

    steps:
      - name: Pull latest config & deploy
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          set -euo pipefail

          # Update docker-compose.yml and scripts from the repo
          git -C /opt/craftcontrol fetch origin main
          git -C /opt/craftcontrol reset --hard origin/main

          # Authenticate with GHCR so private packages can be pulled
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          export IMAGE_TAG
          bash /opt/craftcontrol/deploymentV2/scripts/deploy.sh

  # ────────────────────────────────────────────────────────────────────────────
  # Validate Minecraft startup — all logs visible inline in GitHub Actions UI
  # ────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate Minecraft startup
    needs: deploy
    runs-on: [self-hosted, ct102]
    timeout-minutes: 5

    steps:
      - name: Wait for Paper + plugins to initialise
        run: sleep 90

      - name: Stream Minecraft startup logs
        run: |
          echo "════════════════════ Minecraft startup log ════════════════════"
          docker compose -f /opt/craftcontrol/deploymentV2/docker-compose.yml \
            --env-file /opt/craftcontrol/deploymentV2/.env \
            logs --no-color --tail 500 minecraft 2>&1 | tee /tmp/mc-startup.log
          echo "════════════════════════════════════════════════════════════════"

      - name: Stream API startup logs
        run: |
          echo "════════════════════════ API startup log ════════════════════════"
          docker compose -f /opt/craftcontrol/deploymentV2/docker-compose.yml \
            --env-file /opt/craftcontrol/deploymentV2/.env \
            logs --no-color --tail 100 api 2>&1
          echo "═════════════════════════════════════════════════════════════════"

      - name: Annotate errors
        run: |
          WARNS=$(grep -E "\[WARN\]" /tmp/mc-startup.log || true)
          ERRORS=$(grep -E "\[ERROR\]|\[FATAL\]" /tmp/mc-startup.log || true)

          while IFS= read -r line; do
            [ -n "$line" ] && echo "::warning::$line"
          done <<< "$WARNS"

          if [ -n "$ERRORS" ]; then
            while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::$line"
            done <<< "$ERRORS"
            echo "❌ Errors found in Minecraft startup logs — see annotations above."
            exit 1
          fi

          echo "✅ No errors in Minecraft startup logs."

      - name: Upload full log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-startup-log
          path: /tmp/mc-startup.log
          retention-days: 7
