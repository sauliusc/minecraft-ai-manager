name: Deploy V2 (Docker Compose)

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow one-click manual deploy from GitHub UI

concurrency:
  group: deploy-v2
  cancel-in-progress: false  # never cancel a running deploy mid-flight

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Run tests before deploying
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       craftcontrol_test
          POSTGRES_USER:     craftcontrol
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql://craftcontrol:test_password@localhost:5432/craftcontrol_test
      REDIS_URL:    redis://localhost:6379
      JWT_SECRET:          ci-test-secret-do-not-use-in-production
      JWT_REFRESH_SECRET:  ci-test-refresh-secret-do-not-use-in-production
      MINECRAFT_BRIDGE_URL: http://localhost:25580
      NODE_ENV: test
      PORT: 3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma db push --force-reset --accept-data-loss
      - run: npm test

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy directly on the self-hosted runner inside CT102
  # The runner IS the server — no SSH hop needed
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: test
    runs-on: [self-hosted, ct102]

    steps:
      - name: Pull latest code & deploy
        run: |
          set -euo pipefail

          cd /opt/craftcontrol
          git pull --ff-only

          bash deploymentV2/scripts/deploy.sh

          echo "✓ Deployment finished"

  # ────────────────────────────────────────────────────────────────────────────
  # Validate Minecraft startup on the self-hosted runner inside CT102
  # Runs after deploy so docker compose is already up-to-date
  # ────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate Minecraft startup
    needs: deploy
    runs-on: [self-hosted, ct102]
    timeout-minutes: 5

    steps:
      - name: Wait for Paper + plugins to initialise
        run: sleep 90

      - name: Capture startup logs
        working-directory: /opt/craftcontrol
        run: |
          docker compose logs --no-color --tail 300 minecraft > /tmp/mc-startup.log
          cat /tmp/mc-startup.log

      - name: Parse and annotate errors
        run: |
          WARNS=$(grep -E "\[WARN\]" /tmp/mc-startup.log || true)
          ERRORS=$(grep -E "\[ERROR\]|\[FATAL\]" /tmp/mc-startup.log || true)

          while IFS= read -r line; do
            [ -n "$line" ] && echo "::warning::$line"
          done <<< "$WARNS"

          if [ -n "$ERRORS" ]; then
            while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::$line"
            done <<< "$ERRORS"
            echo "❌ Errors found in Minecraft startup logs — see annotations above."
            exit 1
          fi

          echo "✅ No errors in Minecraft startup logs."

      - name: Upload full log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-startup-log
          path: /tmp/mc-startup.log
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Build & deploy Minecraft plugins (only when plugins/ changes)
  # Runs on self-hosted runner so it can reach the game VM on the local network
  # ────────────────────────────────────────────────────────────────────────────
  deploy-plugins:
    name: Deploy Plugins
    needs: test
    runs-on: [self-hosted, ct102]
    if: >-
      github.event_name == 'push' &&
      contains(toJson(github.event.commits), '"plugins/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build plugins
        run: mvn -f plugins/pom.xml clean package -DskipTests -q

      - name: Upload JARs to game server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.GAME_VM_HOST }}
          username: ${{ secrets.GAME_VM_SSH_USER }}
          key:      ${{ secrets.GAME_VM_SSH_KEY }}
          source:   "plugins/*/target/*-*.jar"
          target:   "/opt/minecraft/plugins/"
          strip_components: 3     # removes plugins/PluginName/target/ prefix

      - name: Restart Minecraft via DiscoPanel
        run: |
          curl -s -f -X POST \
            -H "Authorization: Bearer ${{ secrets.DISCOPANEL_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"signal":"restart"}' \
            "https://${{ secrets.GAME_VM_HOST }}:3001/api/client/servers/${{ secrets.DISCOPANEL_SERVER_ID }}/power"
          echo "✓ Minecraft server restart triggered"
