name: API CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/api.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: craftcontrol
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: craftcontrol_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run migrations
        if: hashFiles('prisma/schema.prisma') != ''
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://craftcontrol:testpass@localhost:5432/craftcontrol_test

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://craftcontrol:testpass@localhost:5432/craftcontrol_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-do-not-use-in-production
          JWT_REFRESH_SECRET: ci-test-refresh-secret-do-not-use-in-production
          MINECRAFT_BRIDGE_URL: http://localhost:25580
          MINECRAFT_BRIDGE_SECRET: ci-bridge-secret
          NODE_ENV: test
          PORT: 3000
